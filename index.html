<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torremolinos Gestión Vacacional - Garantía Airbnb</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .section-padding { padding: 5rem 1.5rem; }
        @media (min-width: 768px) { .section-padding { padding: 5rem 3rem; } }
        @media (min-width: 1024px) { .section-padding { padding: 5rem 6rem; } }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="text-slate-900 bg-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const COMPANY_INFO = {
            name: "Torremolinos Gestión Vacacional",
            address: "C. Campillos, 10, 29620 Torremolinos, Málaga",
            email: "info@gestion-apartamentos-turisticos-torremolinos.com",
            whatsapp: "https://wa.me/34603658260",
            phone: "+34603658260",
            airbnbProfile: "https://www.airbnb.es/p/torremolinos-gestion-vacacional",
            logoUrl: "https://www.gestion-apartamentos-turisticos-torremolinos.com/wp-content/uploads/go-x/u/2c92d1c9-99dd-475f-9dec-624ddd50bc0d/image-342x342.png",
            verificationImageUrl: "https://lh3.googleusercontent.com/p/AF1QipPw7DfHlg0Idu6kHZhLkYwF-6R4Jz9AFCtYh8z5=s1360-w1360-h1020-rw",
            heroImageUrl: "https://raw.githubusercontent.com/torremolinos-gestion-vacacional/garantia-airbnb/refs/heads/main/logo-airbnb-gestion-apartamentos-turistico-torremolinos.jpg"
        };

        const SERVICES = [
            { title: "Entrega y recogida de llaves", icon: "key" },
            { title: "Limpieza profesional", icon: "sparkles" },
            { title: "Lavandería propia", icon: "washing-machine" },
            { title: "Asistencia a clientes 24/7", icon: "clock" },
            { title: "Mantenimiento y cuidado", icon: "hammer" },
            { title: "Optimización de Ingresos", icon: "trending-up" },
            { title: "Registro de viajeros", icon: "file-text" },
            { title: "Sesión de fotos profesional", icon: "camera" }
        ];

        const TESTIMONIALS = [
            {
                name: "Propietario en La Carihuela",
                text: "Desde que Torremolinos Gestión Vacacional lleva mi piso en La Carihuela, duermo tranquilo. Se encargan de todo con una profesionalidad impecable."
            },
            {
                name: "Propietario en El Bajondillo",
                text: "La mejor decisión que he tomado. Mis ingresos han aumentado y los huéspedes siempre dejan reseñas excelentes gracias a su atención."
            }
        ];

        const NEIGHBORHOODS = [
            { name: "La Carihuela", url: "https://www.gestion-apartamentos-turisticos-torremolinos.com/zonas-servicio/la-carihuela/" },
            { name: "Bajondillo", url: "https://www.gestion-apartamentos-turisticos-torremolinos.com/zonas-servicio/el-bajondillo/" },
            { name: "Centro", url: "https://www.gestion-apartamentos-turisticos-torremolinos.com/zonas-servicio/zona-centro/" },
            { name: "Playamar", url: "https://www.gestion-apartamentos-turisticos-torremolinos.com/zonas-servicio/playamar/" },
            { name: "Los Álamos", url: "https://www.gestion-apartamentos-turisticos-torremolinos.com/zonas-servicio/los-alamos/" },
            { name: "El Pinillo", url: "https://www.gestion-apartamentos-turisticos-torremolinos.com/zonas-servicio/el-pinillo/" },
            { name: "Montemar", url: "https://www.gestion-apartamentos-turisticos-torremolinos.com/zonas-servicio/montemar/" },
            { name: "El Calvario", url: "https://www.gestion-apartamentos-turisticos-torremolinos.com/zonas-servicio/el-calvario/" }
        ];

        function Icon({ name, className }) {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        }

        function App() {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                    setIsMenuOpen(false);
                }
            };

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${scrolled ? 'bg-white/90 backdrop-blur-md shadow-sm py-3' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => scrollToSection('hero')}>
                                <img src={COMPANY_INFO.logoUrl} alt="Logo" className="h-12 w-12 rounded-full object-cover border-2 border-blue-100" />
                                <span className={`font-bold text-lg hidden sm:block`}>Torremolinos Gestión Vacacional</span>
                            </div>

                            <div className="hidden md:flex items-center gap-8">
                                <button onClick={() => scrollToSection('servicios')} className="text-sm font-medium hover:text-blue-600 transition-colors">Servicios</button>
                                <button onClick={() => scrollToSection('verificacion')} className="text-sm font-medium flex items-center gap-1 text-blue-600 hover:text-blue-700 transition-colors">
                                    <Icon name="shield-check" className="w-4 h-4" />
                                    Garantía Airbnb
                                </button>
                                <button onClick={() => scrollToSection('testimonios')} className="text-sm font-medium hover:text-blue-600 transition-colors">Opiniones</button>
                                <a href={COMPANY_INFO.whatsapp} target="_blank" className="bg-blue-600 text-white px-6 py-2.5 rounded-full text-sm font-semibold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 flex items-center gap-2">
                                    <Icon name="phone" className="w-4 h-4" />
                                    Contactar
                                </a>
                            </div>

                            <button className="md:hidden p-2" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <Icon name={isMenuOpen ? "x" : "menu"} className="w-6 h-6" />
                            </button>
                        </div>

                        {isMenuOpen && (
                            <div className="absolute top-full left-0 w-full bg-white shadow-xl py-8 px-6 flex flex-col gap-6 md:hidden">
                                <button onClick={() => scrollToSection('servicios')} className="text-lg font-medium text-left">Servicios</button>
                                <button onClick={() => scrollToSection('verificacion')} className="text-lg font-medium text-left text-blue-600 flex items-center gap-2">
                                    <Icon name="shield-check" className="w-5 h-5" />
                                    Garantía Airbnb
                                </button>
                                <button onClick={() => scrollToSection('testimonios')} className="text-lg font-medium text-left">Opiniones</button>
                                <a href={COMPANY_INFO.whatsapp} target="_blank" className="bg-blue-600 text-white px-6 py-4 rounded-xl text-center font-bold flex items-center justify-center gap-2">
                                    <Icon name="phone" className="w-5 h-5" />
                                    Contactar por WhatsApp
                                </a>
                            </div>
                        )}
                    </nav>

                    {/* Hero */}
                    <section id="hero" className="relative pt-32 pb-20 md:pt-48 md:pb-32 overflow-hidden">
                        <div className="max-w-7xl mx-auto px-6 md:px-12 grid lg:grid-cols-2 gap-12 items-center">
                            <div>
                                <div className="inline-flex items-center gap-2 bg-blue-50 text-blue-700 px-4 py-1.5 rounded-full text-sm font-bold mb-6">
                                    <Icon name="star" className="w-4 h-4 fill-blue-700" />
                                    Gestión Profesional en Torremolinos
                                </div>
                                <h1 className="text-5xl md:text-6xl lg:text-7xl leading-[1.1] mb-6">
                                    Verificación Oficial y <span className="text-blue-600">Garantía Total.</span>
                                </h1>
                                <p className="text-lg text-slate-600 mb-8 max-w-xl leading-relaxed">
                                    En este marzo de 2026, la seguridad de tu inversión en Torremolinos no es negociable. No dejes tus llaves a cualquiera; confía en anfitriones <strong>verificados por Airbnb desde 2021</strong> con oficina física en el corazón de la ciudad.
                                </p>
                                <div className="flex flex-wrap gap-4">
                                    <button onClick={() => scrollToSection('verificacion')} className="bg-slate-900 text-white px-8 py-4 rounded-full font-bold hover:bg-slate-800 transition-all flex items-center gap-2">
                                        Ver Garantía Airbnb
                                        <Icon name="chevron-right" className="w-5 h-5" />
                                    </button>
                                    <a href={COMPANY_INFO.whatsapp} className="bg-white border border-slate-200 text-slate-900 px-8 py-4 rounded-full font-bold hover:bg-slate-50 transition-all">
                                        Hablar con un experto
                                    </a>
                                </div>
                            </div>
                            <div className="relative">
                                <img src={COMPANY_INFO.heroImageUrl} alt="Torremolinos" className="rounded-3xl shadow-2xl w-full" />
                                <div className="absolute -bottom-6 -left-6 bg-white p-6 rounded-2xl shadow-xl border border-slate-100 max-w-[200px]">
                                    <p className="text-2xl font-bold text-slate-900">+35%</p>
                                    <p className="text-xs text-slate-500 font-medium">Aumento medio de ingresos anuales</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Services */}
                    <section id="servicios" className="section-padding bg-slate-50">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center mb-16">
                                <h2 className="text-3xl md:text-4xl mb-4">Servicios de Gestión Integral</h2>
                                <p className="text-slate-600 max-w-2xl mx-auto">Nos encargamos de todo el proceso para tu total tranquilidad.</p>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                {SERVICES.map((s, i) => (
                                    <div key={i} className="bg-white p-8 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-all">
                                        <div className="bg-blue-50 w-12 h-12 rounded-xl flex items-center justify-center mb-6">
                                            <Icon name={s.icon} className="text-blue-600 w-6 h-6" />
                                        </div>
                                        <h3 className="text-lg font-bold mb-2">{s.title}</h3>
                                        <p className="text-sm text-slate-500">Profesionalidad y detalle en cada paso.</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Verification */}
                    <section id="verificacion" className="section-padding bg-white">
                        <div className="max-w-7xl mx-auto">
                            <div className="grid lg:grid-cols-2 gap-16 items-center">
                                <div>
                                    <div className="inline-flex items-center gap-2 bg-pink-50 text-pink-600 px-4 py-1.5 rounded-full text-sm font-bold mb-6">
                                        <Icon name="shield-check" className="w-4 h-4" />
                                        Certificación Oficial
                                    </div>
                                    <h2 className="text-4xl md:text-5xl mb-8 leading-tight">
                                        Tu tranquilidad, <br />
                                        <span className="text-pink-600">Nuestra Responsabilidad</span>
                                    </h2>
                                    <div className="space-y-6 text-lg text-slate-600 leading-relaxed">
                                        <p>Somos <strong>Superhosts verificados por Airbnb desde junio de 2021</strong>. Nuestra presencia física en <strong>Calle Campillos</strong> nos permite ofrecer una respuesta inmediata y un control exhaustivo de cada propiedad.</p>
                                        <p>Operamos con éxito en los 8 barrios estratégicos de Torremolinos:</p>
                                        <div className="grid grid-cols-2 gap-2 text-sm font-bold text-slate-700 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                            {NEIGHBORHOODS.map((n, i) => (
                                                <a key={i} href={n.url} target="_blank" className="flex items-center gap-2 hover:text-blue-600 transition-colors">
                                                    <Icon name="map-pin" className="w-4 h-4 text-pink-500" /> 
                                                    {n.name}
                                                </a>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="mt-10">
                                        <a href={COMPANY_INFO.whatsapp} target="_blank" className="bg-pink-600 text-white px-8 py-4 rounded-full font-bold hover:bg-pink-700 transition-all flex items-center justify-center gap-2 shadow-lg shadow-pink-200 inline-flex">
                                            Solicitar Estudio de Rentabilidad Gratuito
                                            <Icon name="trending-up" className="w-4 h-4" />
                                        </a>
                                    </div>
                                </div>
                                <div className="relative">
                                    <div className="bg-white p-4 rounded-[2rem] shadow-2xl border border-pink-100">
                                        <img src={COMPANY_INFO.verificationImageUrl} alt="Airbnb Verification" className="w-full h-auto rounded-2xl" />
                                        <div className="mt-6 flex items-center justify-between px-2">
                                            <div className="flex items-center gap-2">
                                                <div className="w-3 h-3 bg-green-500 rounded-full"></div>
                                                <span className="text-sm font-bold text-slate-700">Identidad Verificada</span>
                                            </div>
                                            <span className="text-xs text-slate-400 font-medium">Desde Junio 2021</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Testimonials */}
                    <section id="testimonios" className="section-padding bg-slate-900 text-white">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center mb-16">
                                <h2 className="text-3xl md:text-4xl mb-4">Opiniones de Propietarios</h2>
                            </div>
                            <div className="grid md:grid-cols-2 gap-8">
                                {TESTIMONIALS.map((t, i) => (
                                    <div key={i} className="bg-white/5 p-10 rounded-3xl border border-white/10">
                                        <p className="text-xl italic mb-8">"{t.text}"</p>
                                        <p className="font-bold">{t.name}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-slate-50 pt-20 pb-10 border-t border-slate-200">
                        <div className="max-w-7xl mx-auto px-6 md:px-12 text-center">
                            <img src={COMPANY_INFO.logoUrl} alt="Logo" className="h-16 w-16 rounded-full mx-auto mb-6" />
                            <p className="text-slate-500 mb-8">Expertos en gestión de alojamientos turísticos en Torremolinos.</p>
                            <div className="text-xs text-slate-400">
                                © 2026 Torremolinos Gestión Vacacional. Todos los derechos reservados.
                            </div>
                        </div>
                    </footer>

                    {/* WhatsApp */}
                    <a href={COMPANY_INFO.whatsapp} target="_blank" className="fixed bottom-8 right-8 bg-green-500 text-white p-4 rounded-full shadow-2xl hover:bg-green-600 transition-all z-40">
                        <Icon name="phone" className="w-6 h-6" />
                    </a>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
